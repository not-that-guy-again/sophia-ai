services:
  sophia:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      surrealdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sophia
      POSTGRES_PASSWORD: sophia
      POSTGRES_DB: sophia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sophia"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --user root --pass root rocksdb:/data/srdb.db
    volumes:
      - surrealdb_data:/data
    ports:
      - "8529:8000"

volumes:
  postgres_data:
  surrealdb_data:
